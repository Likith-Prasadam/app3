name: Flask DevOps Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          python -m pytest

  docker-build:
    needs: build-and-test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t student-task-manager .

  deploy:
    needs: docker-build

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 using SSH

        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |

            cd ~

            if [ ! -d "student-task-manager" ]; then
              git clone YOUR_GITHUB_REPO_URL
            fi

            cd student-task-manager

            git pull origin master

            sudo docker stop task-container || true

            sudo docker rm task-container || true

            sudo docker build -t student-task-manager .

            sudo docker run -d \
              -p 5000:5000 \
              --name task-container \
              student-task-manager
