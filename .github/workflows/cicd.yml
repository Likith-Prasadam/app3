name: Flask DevOps Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          python -m pytest

      - name: Build Docker Image
        run: |
          docker build -t student-task-manager .

      # Copy project files to EC2

      - name: Copy Files to EC2

        uses: appleboy/scp-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          source: "."
          target: "/home/ubuntu/student-task-manager"

      # SSH into EC2 and run Docker

      - name: Deploy to EC2

        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |

            cd /home/ubuntu/student-task-manager

            sudo docker stop task-container || true

            sudo docker rm task-container || true

            sudo docker build -t student-task-manager .

            sudo docker run -d \
              -p 5000:5000 \
              --name task-container \
              student-task-manager
